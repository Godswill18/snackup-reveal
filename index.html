<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Critical resource hints ───────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preload" as="image" href="/burst_snack.webp" fetchpriority="high" />

    <!-- ── Primary SEO ──────────────────────────────────────────── -->
    <title>SnackUP Vending — Modern Fully Managed Vending Solutions</title>
    <meta name="description" content="SnackUP Vending supplies and maintains premium smart vending machines stocked with popular snacks and drinks. Serving offices, gyms, schools, warehouses, and hotels. Get a machine today." />
    <meta name="keywords" content="vending machine, smart vending, managed vending, snack vending, drink vending, office vending, gym vending, school vending, warehouse vending, hotel vending, contactless vending, vending solutions, SnackUP" />
    <meta name="author" content="SnackUP Vending" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://snackupvending.shop/" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ─────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SnackUP Vending" />
    <meta property="og:title" content="SnackUP Vending — Modern Fully Managed Vending Solutions" />
    <meta property="og:description" content="Premium smart vending machines stocked with popular snacks and drinks — fully managed, always restocked. Offices, gyms, schools, warehouses, and hotels." />
    <meta property="og:url" content="https://snackupvending.shop/" />
    <meta property="og:image" content="https://snackupvending.shop/og-image.jpg" />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SnackUP smart vending machine — Snack More. Live More." />
    <meta property="og:locale" content="en_GB" />

    <!-- ── Twitter / X Card ──────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SnackUPVending" />
    <meta name="twitter:title" content="SnackUP Vending — Modern Fully Managed Vending Solutions" />
    <meta name="twitter:description" content="Premium smart vending machines stocked with popular snacks and drinks — fully managed, always restocked." />
    <meta name="twitter:image" content="https://snackupvending.shop/og-image.jpg" />
    <meta name="twitter:image:alt" content="SnackUP smart vending machine" />

    <!-- ── Theme & PWA hints ─────────────────────────────────────── -->
    <meta name="theme-color" content="#ff6b35" />
    <meta name="color-scheme" content="dark light" />

    <!-- ── Structured Data (JSON-LD) ────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://snackupvending.shop/#organization",
          "name": "SnackUP Vending",
          "url": "https://snackupvending.shop",
          "logo": {
            "@type": "ImageObject",
            "url": "https://snackupvending.shop/favicon.svg"
          },
          "description": "SnackUP Vending provides modern, fully managed vending solutions designed to keep people fuelled throughout the day. We supply and maintain high-quality vending machines stocked with a wide range of popular snacks and drinks.",
          "email": "hello@snackup.vending",
          "contactPoint": [
            {
              "@type": "ContactPoint",
              "email": "hello@snackup.vending",
              "contactType": "customer service"
            },
            {
              "@type": "ContactPoint",
              "email": "sales@snackup.vending",
              "contactType": "sales"
            }
          ],
          "sameAs": []
        },
        {
          "@type": "Service",
          "@id": "https://snackupvending.shop/#service",
          "name": "Fully Managed Smart Vending Machine Solutions",
          "provider": {
            "@id": "https://snackupvending.shop/#organization"
          },
          "description": "We supply, install, and fully manage smart vending machines stocked with popular snacks and drinks for offices, gyms, schools, warehouses, and hotels.",
          "serviceType": "Vending Machine Service",
          "areaServed": {
            "@type": "Country",
            "name": "United Kingdom"
          },
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Vending Machine Placement",
            "itemListElement": [
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Office Vending Machine" } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Gym Vending Machine" } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "School Vending Machine" } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Warehouse Vending Machine" } },
              { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Hotel Vending Machine" } }
            ]
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://snackupvending.shop/#website",
          "url": "https://snackupvending.shop",
          "name": "SnackUP Vending",
          "description": "Modern fully managed vending solutions — Snack More. Live More.",
          "publisher": {
            "@id": "https://snackupvending.shop/#organization"
          },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://snackupvending.shop/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- ── Favicon ────────────────────────────────────────────────── -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  </head>

    <div id="root"></div>

</html>
